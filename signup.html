<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    
        <div class="login-screen">
    <!-- <img src="image/top.png" class="top-shape" alt=""> -->

   
    <div class="login-logo">
        <img src="image/logo.png" alt="">
    </div>

    <p class="login-tagline">
        A Learning Foundation for Neurodiverse kids
    </p>

    <div class="login-small-line"></div>

    <!-- <div class="login-happy-wrapper">
        <span class="login-heart">❤</span>

        <div class="login-happy-pill">
            Happy Children Happy Parents
        </div>

        <span class="login-heart">❤</span>
    </div> -->

    <div class="login-content">

        <h2 class="login-title">
            
        Create Your Account
        
        </h2>

        <p class="login-subtitle">
            
        Join us and be a part of a journey.
    
        </p>

        <div class="login-input-group">
            <i class="fa-regular fa-face-smile"></i>
            <input type="text" placeholder="Child Name">
        </div>

        <div class="login-input-group">
            <i class="fa-regular fa-user"></i>
            <input type="password" placeholder="Parent Name">
        </div>

         <div class="login-input-group">
            <i class="fa-regular fa-calendar"></i>
            <input type="password" placeholder="Child Age">
        </div>

         <div class="login-input-group">
            <i class="fa-solid fa-children"></i>
           <select>
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
        </div>
         <div class="login-input-group">
            <i class="fa-solid fa-phone"></i>
            <input type="number" placeholder="Phone number">
        </select>
        </div>

        <div class="terms-box">
        <input type="checkbox">

        <label>
            I agree to the
            <span>Terms &amp; Conditions</span>
            and
            <span>Privacy Policy</span>
        </label>
    </div>

       

        <a href="login.html" class="login-btn">
             Sign Up
        </a>

        <div class="or-divider">
            <span>OR</span>
        </div>

        <div class="signup-social-row">
            <button class="signup-social-btn">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="22" alt="">
                Google
            </button>

            <button class="signup-social-btn">
                <svg class="social-icon" width="24" height="24" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="12" fill="#1877F2"/>
            <path d="M13.52 19V12.62H15.66L15.98 10.13H13.52V8.54C13.52 7.82 13.72 7.33 14.76 7.33H16.06V5.1C15.43 5.03 14.8 4.99 14.17 5C12.3 5 11.02 6.14 11.02 8.24V10.13H9V12.62H11.02V19H13.52Z" fill="white"/>
        </svg>

                Facebook
            </button>
        </div>

        <p class="signup-text">
            Already have an account?
            <a href="login.html">Log In</a>
        </p>

    </div>

   
 <img src="image/bottom.png" class="bottom-shape" alt="">
    

</div>

    
</body>
</html>

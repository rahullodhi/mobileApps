<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dharmagra Splash</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta http-equiv="refresh" content="5;url=starttest.html">
</head>
<body>

<div class="splash-screen">

    <!-- Top Shape -->
    <img src="image/top.png" class="top-shape" alt="">

    <!-- Background Pattern -->
    <div class="bg-pattern"></div>

    <!-- Center Logo -->
    <div class="logo-section" style="margin-top: 0;">
        <img src="image/logo.png" alt="Dharmagra Logo">
    </div>

    <!-- Tagline -->
    <p class="tagline">
        A Learning Foundation for Neurodiverse kids
    </p>

    <div class="small-line"></div>

    <!-- Happy Button -->
    <div class="happy-wrapper">

    <span class="heart">❤</span>

    <div class="happy-box">
        Happy Children Happy Parents
    </div>

    <span class="heart">❤</span>

</div>

    <!-- Features -->
    <div class="features">

        <div class="feature">
            <div class="icon"><i class="fas fa-brain"></i></div>
            <h4>UNDERSTAND</h4>
        </div>

        <div class="divider"></div>

        <div class="feature">
            <div class="icon red"><i class="fas fa-hand-holding-heart"></i></div>
            <h4 class="text-red">EMPOWER</h4>
        </div>

        <div class="divider"></div>

        <div class="feature">
            <div class="icon"><i class="fas fa-wand-magic-sparkles"></i></div>
            <h4>INSPIRE</h4>
        </div>

    </div>

    <!-- Bottom Text -->
    <!-- <h2 class="hope-text">
        INSPIRING HOPE,<br>
        THROUGH KINDNESS
    </h2>

    <div class="small-line"></div> -->

    <!-- Bottom Shape -->
    <img src="image/bottom.png" class="bottom-shape" alt="">

</div>
    




</body>
</html>

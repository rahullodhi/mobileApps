        <div class="login-screen">

    <p class="login-tagline">

    </p>

    <div class="login-small-line"></div>

    <div class="login-content">

        </div>

            <i class="fa-solid fa-lock"></i>

        <a href="index.html" class="forgot-password">

        </a>

        <a href="video-upload.html" class="login-btn">

        </a>

            <span>OR</span>
        </div>

        <div class="signup-social-row">
            <button class="signup-social-btn">

            <button class="signup-social-btn">

        </svg>
